<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lithos Otel | Eski Foça</title>
    <style>
        /* ARKA PLAN VE YAN YAZILAR */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: #3e4a3d; /* Yeşil arka plan */
            color: #4a4a4a; 
            position: relative;
        }

        /* YAN YAZILAR İÇİN CSS */
        .yan-yazi {
            position: fixed;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            color: rgba(255,255,255,0.2);
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 10px;
            pointer-events: none; /* Yazıya tıklanmasın */
            z-index: -1;
        }
        .sol { left: 50px; }
        .right { right: 50px; }

        .container { background-color: #f9f6f0; max-width: 1000px; margin: 0 auto; min-height: 100vh; padding: 20px; }
        
        .hero { text-align: center; padding: 40px 20px; }
        .hero img { max-width: 600px; width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .hero-btns { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        
        .ana-yerlesim { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; margin-top: 40px; }
        @media (max-width: 900px) { .ana-yerlesim { grid-template-columns: 1fr; } }
        
        .sag-kart { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e6e0d4; margin-bottom: 20px; }
        .hizli-btn { padding: 12px 25px; background-color: #2b78e4; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .insta-btn { padding: 12px 25px; background-color: #E1306C; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 40px; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.3s; border: 1px solid #ddd; }
        .card img:hover { transform: scale(1.03); }
        
        footer { text-align: center; padding: 40px; }
    </style>
</head>
<body>

    <!-- YAN YAZILAR -->
    <div class="yan-yazi sol">LITHOS BUTİK OTEL</div>
    <div class="yan-yazi right">LITHOS BUTİK OTEL</div>

    <div class="container">
        <section class="hero">
            <img src="binaresmi.JPG" alt="Lithos Otel">
            <div class="hero-btns">
                <a href="tel:+902328127788" class="hizli-btn">📞 Hemen Ara</a>
                <a href="https://www.instagram.com/lithosotel?igsh=MTVweWswZXFuazk3eA==" target="_blank" class="insta-btn">📸 Instagram</a>
            </div>
        </section>

        <div class="ana-yerlesim">
            <div class="sol-icerik">
                <h2>Ahşap Odalar</h2>
                <div class="grid">
                    <div class="card"><img src="ahsap1.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="ahsap2.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="ahsap3.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="ahsap4.jpg" onclick="window.open(this.src)"></div>
                </div>
                <h2>Taş Odalar</h2>
                <div class="grid">
                    <div class="card"><img src="tas1.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="tas2.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="tas3.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="tas4.jpg" onclick="window.open(this.src)"></div>
                </div>
            </div>

            <div class="sag-sutun">
                <div class="sag-kart">
                    <h3>Görüş & Öneri</h3>
                    <form id="dilekFormu" action="https://formspree.io/f/mvzjwden" method="POST">
                        <input type="text" name="ad_soyad" placeholder="Adınız" required style="width:100%; padding:8px; margin-bottom:5px; box-sizing:border-box;">
                        <textarea name="mesaj" placeholder="Mesajınız..." rows="3" required style="width:100%; padding:8px; margin-bottom:10px; box-sizing:border-box;"></textarea>
                        <button type="submit" id="submitBtn" style="width:100%; padding:10px; background:#3e4a3d; color:white; border:none; border-radius:4px; cursor:pointer;">Gönder</button>
                    </form>
                    <p id="successMsg" style="display:none; color:green; text-align:center; font-weight:bold;">Mesajınız iletildi, teşekkürler!</p>
                </div>
                <div class="sag-kart">
                    <h3>Konum</h3>
                    <iframe src="https://maps.google.com/maps?q=Ismetpasa%20Mah.%20200%20Sok.%20No:26,%20Eski%20Foca&t=&z=15&ie=UTF8&iwloc=&output=embed" width="100%" height="200" style="border:0;"></iframe>
                </div>
            </div>
        </div>
        <footer>©️ 2026 Lithos Otel Foça</footer>
    </div>

    <script>
        const form = document.getElementById('dilekFormu');
        const msg = document.getElementById('successMsg');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData(form);
            const response = await fetch(form.action, { method: 'POST', body: data, headers: {'Accept': 'application/json'} });
            if (response.ok) {
                form.style.display = 'none';
                msg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
