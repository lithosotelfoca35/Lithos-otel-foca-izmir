<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Lithos Otel | Eski Foça</title>
    <style>
        /* Tamamen yeşil arka plan */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: #3e4a3d; 
            color: #4a4a4a; 
            overflow-x: hidden; /* Yan yazıların kaymayı bozmaması için */
        }

        /* YAN YAZILAR: Bu kısım beyazlıkları kapatacak ve yazıyı gösterecek */
        .yan-yazi {
            position: fixed;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            color: rgba(255, 255, 255, 0.3);
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 10px;
            z-index: 1; /* Yazı en üstte görünsün */
            pointer-events: none;
            text-transform: uppercase;
        }
        .sol { left: 40px; }
        .right { right: 40px; }

        .container { background-color: #f9f6f0; max-width: 1000px; margin: 0 auto; padding: 20px; min-height: 100vh; position: relative; z-index: 2; }
        
        /* Fotoğrafı ortalayan kısım */
        .hero { text-align: center; padding: 20px; }
        .hero img { max-width: 600px; width: 100%; border-radius: 12px; }
        .hero-btns { display: flex; gap: 10px; justify-content: center; margin: 10px 0; }
        .btn { padding: 10px 20px; border-radius: 5px; text-decoration: none; color: white; font-weight: bold; }
        .hizli-btn { background-color: #2b78e4; }
        .insta-btn { background-color: #E1306C; }

        /* İçerik düzeni */
        .ana-yerlesim { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .card img { width: 100%; height: 150px; object-fit: cover; cursor: pointer; border-radius: 5px; }
        .sag-kart { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="yan-yazi sol">LITHOS BUTİK OTEL</div>
    <div class="yan-yazi right">LITHOS BUTİK OTEL</div>

    <div class="container">
        <section class="hero">
            <img src="binaresmi.JPG" alt="Lithos Otel">
            <div class="hero-btns">
                <a href="tel:+902328127788" class="btn hizli-btn">Ara</a>
                <a href="https://www.instagram.com/lithosotel" class="btn insta-btn">Instagram</a>
            </div>
        </section>

        <div class="ana-yerlesim">
            <div class="sol-icerik">
                <h2>Odalarımız</h2>
                <div class="grid">
                    <div class="card"><img src="ahsap1.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="ahsap2.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="ahsap3.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="ahsap4.jpg" onclick="window.open(this.src)"></div>
                </div>
            </div>
            <div class="sag-sutun">
                <div class="sag-kart">
                    <h3>Görüş & Öneri</h3>
                    <form id="dilekFormu" action="https://formspree.io/f/mvzjwden" method="POST">
                        <input type="text" name="ad" placeholder="Adınız" required style="width:100%; margin-bottom:5px;">
                        <textarea name="mesaj" placeholder="Mesajınız..." required style="width:100%; height:60px;"></textarea>
                        <button type="submit" style="width:100%;">Gönder</button>
                    </form>
                    <p id="msg" style="display:none; color:green;">İletildi!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const f = document.getElementById('dilekFormu');
        f.addEventListener('submit', async (e) => {
            e.preventDefault();
            const r = await fetch(f.action, {method: 'POST', body: new FormData(f), headers: {'Accept': 'application/json'}});
            if(r.ok) { f.style.display = 'none'; document.getElementById('msg').style.display = 'block'; }
        });
    </script>
</body>
</html>
