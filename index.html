<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lithos Otel | Eski Foça</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f9f6f0; color: #4a4a4a; }
        header { background-color: #3e4a3d; color: white; text-align: center; padding: 40px 20px; }
        
        .hero { 
            width: 100%; height: 100vh; 
            background: url('binaresmi.JPG') no-repeat center center/cover; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: white; text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
        }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; }
        
        /* Butonlar için özel alan */
        .hero-btns { display: flex; gap: 15px; margin-top: 20px; }

        .ana-yerlesim { max-width: 1200px; margin: 50px auto; padding: 0 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }
        @media (max-width: 900px) { .ana-yerlesim { grid-template-columns: 1fr; } }

        .sol-icerik { display: flex; flex-direction: column; gap: 40px; }
        .sag-sutun { display: flex; flex-direction: column; gap: 30px; }
        
        .sag-kart { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e6e0d4; }
        .hizli-btn { display: block; background-color: #2b78e4; color: white; padding: 12px; text-align: center; font-weight: bold; text-decoration: none; border-radius: 8px; }
        .insta-btn { display: block; background-color: #E1306C; color: white; padding: 12px; text-align: center; font-weight: bold; text-decoration: none; border-radius: 8px; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 15px; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .card img:hover { transform: scale(1.05); }
        
        footer { text-align: center; padding: 40px; background: #3e4a3d; color: #f9f6f0; margin-top: 50px; }
    </style>
</head>
<body>

<section class="hero">
    <h1>LİTHOS OTEL</h1>
    <p>Foça'nın kalbinde huzurlu bir vaha</p>
    <div class="hero-btns">
        <a href="tel:+902328127788" class="hizli-btn" style="background:#2b78e4;">📞 Hemen Ara</a>
        <a href="https://www.instagram.com/lithosotel?igsh=MTVweWswZXFuazk3eA==" target="_blank" class="insta-btn" style="background:#E1306C;">📸 Instagram</a>
    </div>
</section>

<div class="ana-yerlesim">
    <div class="sol-icerik">
        <section>
            <h2>Ahşap Odalar</h2>
            <div class="grid">
                <div class="card"><img src="ahsap1.jpg" onclick="window.open(this.src)"></div>
                <div class="card"><img src="ahsap2.jpg" onclick="window.open(this.src)"></div>
                <div class="card"><img src="ahsap3.jpg" onclick="window.open(this.src)"></div>
                <div class="card"><img src="ahsap4.jpg" onclick="window.open(this.src)"></div>
            </div>
        </section>
        <section>
            <h2>Taş Odalar</h2>
            <div class="grid">
                <div class="card"><img src="tas1.jpg" onclick="window.open(this.src)"></div>
                <div class="card"><img src="tas2.jpg" onclick="window.open(this.src)"></div>
                <div class="card"><img src="tas3.jpg" onclick="window.open(this.src)"></div>
                <div class="card"><img src="tas4.jpg" onclick="window.open(this.src)"></div>
            </div>
        </section>
    </div>

    <div class="sag-sutun">
        <div class="sag-kart">
            <h3>Görüş & Öneri</h3>
            <form id="dilekFormu" action="https://formspree.io/f/mvzjwden" method="POST">
                <input type="text" name="ad_soyad" placeholder="Adınız" required style="width:100%; padding:8px; margin-bottom:5px; box-sizing:border-box;">
                <textarea name="mesaj" placeholder="Mesajınız..." rows="3" required style="width:100%; padding:8px; margin-bottom:10px; box-sizing:border-box;"></textarea>
                <button type="submit" style="width:100%; padding:10px; background:#3e4a3d; color:white; border:none; border-radius:4px;">Gönder</button>
            </form>
        </div>
        <div class="sag-kart">
            <h3>Konum</h3>
            <iframe src="https://maps.google.com/maps?q=Ismetpasa%20Mah.%20200%20Sok.%20No:26,%20Eski%20Foca&t=&z=15&ie=UTF8&iwloc=&output=embed" width="100%" height="200" style="border:0;"></iframe>
        </div>
    </div>
</div>

<footer>©️ 2026 Lithos Otel Foça</footer>

</body>
</html>
