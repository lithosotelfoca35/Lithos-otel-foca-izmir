<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lithos Otel | Eski Foça</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #3e4a3d; color: #4a4a4a; }
        .container { background-color: #f9f6f0; max-width: 1000px; margin: 0 auto; min-height: 100vh; padding: 20px; }
        
        .hero { text-align: center; padding: 40px 20px; }
        .hero img { max-width: 600px; width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .hero-btns { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        
        .btn { padding: 12px 25px; border-radius: 8px; font-weight: bold; text-decoration: none; color: white; }
        .hizli-btn { background-color: #2b78e4; }
        .insta-btn { background-color: #E1306C; }

        .ana-yerlesim { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; margin-top: 40px; }
        @media (max-width: 900px) { .ana-yerlesim { grid-template-columns: 1fr; } }
        
        .sag-kart { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e6e0d4; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        
        footer { text-align: center; padding: 20px; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="container">
        <section class="hero">
            <img src="binaresmi.JPG" alt="Lithos Otel">
            <div class="hero-btns">
                <a href="tel:+902328127788" class="btn hizli-btn">Hemen Ara</a>
                <a href="https://www.instagram.com/lithosotel" target="_blank" class="btn insta-btn">Instagram</a>
            </div>
        </section>

        <div class="ana-yerlesim">
            <div class="sol-icerik">
                <h2>Odalarımız</h2>
                <div class="grid">
                    <div class="card"><img src="ahsap1.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="ahsap2.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="tas1.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="tas2.jpg" onclick="window.open(this.src)"></div>
                </div>
            </div>

            <div class="sag-sutun">
                <div class="sag-kart">
                    <h3>Görüş & Öneri</h3>
                    <form id="dilekFormu" action="https://formspree.io/f/mvzjwden" method="POST">
                        <input type="text" name="ad" placeholder="Adınız" required style="width:100%; margin-bottom:10px; padding:8px;">
                        <textarea name="mesaj" placeholder="Mesajınız..." required style="width:100%; height:80px; padding:8px;"></textarea>
                        <button type="submit" style="width:100%; padding:10px; background:#3e4a3d; color:white; border:none; cursor:pointer;">Gönder</button>
                    </form>
                    <p id="msg" style="display:none; color:green; font-weight:bold;">Mesajınız iletildi!</p>
                </div>
            </div>
        </div>
        <footer>©️ 2026 Lithos Otel Foça</footer>
    </div>

    <script>
        const f = document.getElementById('dilekFormu');
        f.addEventListener('submit', async (e) => {
            e.preventDefault();
            const r = await fetch(f.action, {method: 'POST', body: new FormData(f), headers: {'Accept': 'application/json'}});
            if(r.ok) { f.style.display = 'none'; document.getElementById('msg').style.display = 'block'; }
        });
    </script>
</body>
</html>
