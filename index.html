<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Lithos Butik Otel</title>
    <style>
        body { margin: 0; background-color: #3e4a3d; color: #4a4a4a; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        
        /* Yan Yazılar */
        .yan-yazi { position: fixed; top: 50%; transform: translateY(-50%) rotate(-90deg); color: rgba(255,255,255,0.2); font-size: 3rem; font-weight: bold; letter-spacing: 20px; pointer-events: none; z-index: 1; }
        .sol { left: 40px; } .right { right: 40px; }

        /* Ana İçerik */
        .container { background: #f9f6f0; width: 900px; padding: 40px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 2; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero img { width: 100%; max-width: 600px; border-radius: 15px; }
        
        .ana-kutu { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        
        .sag-panel { background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #ddd; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #3e4a3d; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="yan-yazi sol">LITHOS BUTİK OTEL</div>
    <div class="yan-yazi right">LITHOS BUTİK OTEL</div>

    <div class="container">
        <div class="hero"><img src="binaresmi.JPG" alt="Otel"></div>
        
        <div class="ana-kutu">
            <div class="sol-taraf">
                <h2>Odalarımız</h2>
                <div class="grid">
                    <div class="card"><img src="ahsap1.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="ahsap2.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="tas1.jpg" onclick="window.open(this.src)"></div>
                    <div class="card"><img src="tas2.jpg" onclick="window.open(this.src)"></div>
                </div>
            </div>
            <div class="sag-panel">
                <h3>Bize Yazın</h3>
                <form id="f" action="https://formspree.io/f/mvzjwden" method="POST">
                    <input type="text" name="ad" placeholder="İsim" required>
                    <textarea name="mesaj" placeholder="Mesajınız" required></textarea>
                    <button type="submit">Gönder</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
